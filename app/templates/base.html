<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EasyEquities Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  {% if session.get('username') %}
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-logo">📈</span>
      <span class="nav-title">EasyEquities</span>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{{ url_for('categories') }}" class="nav-link {% if request.endpoint == 'categories' %}active{% endif %}">Categories</a>
      <a href="{{ url_for('instruments') }}" class="nav-link {% if request.endpoint in ['instruments','instrument_detail'] %}active{% endif %}">Instruments</a>
    </div>
    <div class="nav-user">
      <span class="nav-username">{{ session['username'] }}</span>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline">Logout</a>
    </div>
  </nav>
  {% endif %}
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
